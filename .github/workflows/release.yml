name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Stage 1: create a draft GitHub release and capture its ID
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const isPrerelease = /alpha|beta|rc/.test(tag)
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `TaTing ${tag}`,
              body: `## TaTing ${tag}\n\n### 📥 下载\n\n- **Windows**: \`.msi\` 或 \`-setup.exe\`\n- **macOS**: \`.dmg\` (Universal: Intel + Apple Silicon)\n- **Linux**: \`.AppImage\` 或 \`.deb\`\n\n### ⚠️ 重要提示\n\n**模型文件不包含在安装包中**，首次安装后需要下载模型文件（详见 README）。\n\n### 🔐 自动更新\n\n应用内置自动更新，点击托盘菜单"检查更新"即可。`,
              draft: true,
              prerelease: isPrerelease,
            })
            return data.id

  # Stage 2: build all platforms in parallel and upload to the draft release
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Download models (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path scripts/download-models.ps1) {
            & scripts/download-models.ps1
          }

      - name: Download models (macOS / Linux)
        if: matrix.platform != 'windows-latest'
        run: |
          chmod +x scripts/download-models.sh
          ./scripts/download-models.sh

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # Stage 3: publish the release (remove draft) once all builds succeed
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.RELEASE_ID,
              draft: false,
            })

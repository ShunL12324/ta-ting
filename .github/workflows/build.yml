name: Build on Push

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Download Sherpa-ONNX models (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Downloading Sherpa-ONNX models..."
          if (Test-Path scripts/download-models.ps1) {
            & scripts/download-models.ps1
          } else {
            Write-Host "Download script not found, skipping model download"
          }

      - name: Download Sherpa-ONNX models (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "Downloading Sherpa-ONNX models..."
          if [ -f scripts/download-models.sh ]; then
            chmod +x scripts/download-models.sh
            ./scripts/download-models.sh
          else
            echo "Download script not found, skipping model download"
          fi

      - name: Build Tauri app (compile only)
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src-tauri/target/release/bundle/**/*
          retention-days: 7

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: src-tauri/target/release/bundle/**/*
          retention-days: 7
